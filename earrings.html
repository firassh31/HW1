<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Rubik:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="main" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="header-inner">
          <a href="index.html" class="logo-link">
            <img src="images/earrings-logo.webp" alt="Earring Logo">
          </a>
          <span class="logo-text">Sat Nam Jewelry</span>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="earrings.html" class="active">Our Earrings</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
          </ul>
        </nav>
    </div>
    </header>
<main>
    <section class="images_container">
            <img class="earring1" src="images/earring1.webp" alt="Earrings 1">
            <img class="middle-image" src="images/earringp2.webp" alt="Earrings 2">
            <img class="earring3" src="images/earringph3.jpg" alt="Earrings 3">
    </section>
    <h2>List of Earrings</h2>
    <div class="page-wrap">
    <ul class="earring-list">
      <li><span class="icon"></span> Gold Hoops</li>
      <li><span class="icon"></span> Pearl Drops</li>
      <li><span class="icon"></span> Diamond Studs</li>
      <li><span class="icon"></span> Vintage Tassels</li>
    </ul>
    </div>
        <div class="your-choice">
            <h3>Your Choice</h3>
            <form class="choice-box">
              <label for="earringType">Earring style</label>
              <select id="earringType" name="earringType" required>
                <option value="">Choose a style</option>
                <option value="gold-hoops">Gold Hoops</option>
                <option value="pearl-drops">Pearl Drops</option>
                <option value="diamond-studs">Diamond Studs</option>
                <option value="vintage-tassels">Vintage Tassels</option>
              </select>
              <label for="notes">Notes for your custom order</label>
              <textarea id="notes" name="notes" rows="3" placeholder="Color, size, or any special request..."></textarea>
              <button type="submit">Send Choice</button>
            </form>
        </div>
</main>
<footer>
    <div class="footer_item">
      <h3>Who We Are</h3>
      <a href="#about">About</a>
      <a href="#">Team</a>
      <a href="#">Work with Us</a>

      <div class="footer_contains">

        </div>
      </div>

    </div>

    <div class="footer_item">
      <h3>Follow Us</h3>
      <a href="https://twitter.com/" target="_blank">Twitter</a>
      <a href="https://www.facebook.com/" target="_blank">Facebook</a>
      <a href="https://www.instagram.com/" target="_blank">Instagram</a>
    </div>
  </footer>
